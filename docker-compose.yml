version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gl_reporting
      POSTGRES_USER: gl_user
      POSTGRES_PASSWORD: gl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gl_user -d gl_reporting"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: gl_reporting
      DATABASE_USER: gl_user
      DATABASE_PASSWORD: gl_password
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: gl-reporting-dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app/backend

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: celery -A workers.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: gl_reporting
      DATABASE_USER: gl_user
      DATABASE_PASSWORD: gl_password
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: gl-reporting-dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app/backend

volumes:
  postgres_data:
  qdrant_data:
